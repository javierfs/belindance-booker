name: Monitor (Days 6-28)

on:
  schedule:
    # Every 15 minutes on days 6-28 (single scan per run, no turbo)
    - cron: '*/15 * 6-28 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual booking)'
        type: boolean
        default: false

concurrency:
  group: booker
  cancel-in-progress: true

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Configure /etc/hosts (Cloudflare bypass)
        if: ${{ vars.WB_SERVER_IP != '' }}
        run: |
          echo "${{ vars.WB_SERVER_IP }} wodbuster.com" | sudo tee -a /etc/hosts
          echo "${{ vars.WB_SERVER_IP }} belindance.wodbuster.com" | sudo tee -a /etc/hosts

      - name: Run booker
        env:
          WB_EMAIL: ${{ secrets.WB_EMAIL }}
          WB_PASSWORD: ${{ secrets.WB_PASSWORD }}
          BOX_URL: ${{ vars.BOX_URL }}
          CLASS_NAME: ${{ vars.CLASS_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          BOOKING_START_DATE: '2026-05-18'
          BOOKING_END_DATE: '2026-05-31'
          MAX_BOOKINGS_PER_WEEK: '1'
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py
