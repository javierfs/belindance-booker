name: Catch Class Release

on:
  schedule:
    - cron: '25 13 5 5 *'  # 14:25 Canary (13:25 UTC) on May 5 — teacher releases ~15h
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual booking)'
        type: boolean
        default: false

concurrency:
  group: booker
  cancel-in-progress: true

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 85

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Configure /etc/hosts (Cloudflare bypass)
        if: ${{ vars.WB_SERVER_IP != '' }}
        run: |
          echo "${{ vars.WB_SERVER_IP }} wodbuster.com" | sudo tee -a /etc/hosts
          echo "${{ vars.WB_SERVER_IP }} belindance.wodbuster.com" | sudo tee -a /etc/hosts

      - name: Run turbo booker (polls every 5s; 65min on schedule, 45min on manual)
        env:
          WB_EMAIL: ${{ secrets.WB_EMAIL }}
          WB_PASSWORD: ${{ secrets.WB_PASSWORD }}
          BOX_URL: ${{ vars.BOX_URL }}
          CLASS_NAME: ${{ vars.CLASS_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          CHECK_TIME_WINDOW_ENABLED: 'true'
          CHECK_TIME_WINDOW_START: '14:25'
          CHECK_TIME_WINDOW_END: '15:30'
          CHECK_TIME_WINDOW_TIMEZONE: 'Atlantic/Canary'
          BOOKING_START_DATE: '2026-05-13'
          BOOKING_END_DATE: '2026-05-31'
          MAX_BOOKINGS_PER_WEEK: '1'
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py --turbo --duration ${{ github.event_name == 'schedule' && '3900' || '2700' }} --interval 5
